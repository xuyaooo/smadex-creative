<style>

  .pill-Continue { background:#dbeafe; color:#1e40af; }

<body class="bg-gray-50 text-gray-900">
<div id="app"></div>

<script>
const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;

const API = window.location.origin.includes(':5173')
  ? 'http://localhost:8000'   // Vue dev mode → talks to FastAPI on 8000
  : '';                        // Production → same origin (FastAPI serves the SPA)

const STATUS_PILL = {
  top_performer: 'pill-top',
  stable: 'pill-stable',
  fatigued: 'pill-fatigued',
  underperformer: 'pill-under',
};

  top_performer: 'Top performer', stable: 'Stable',
  fatigued: 'Fatigued', underperformer: 'Underperformer',

const ACTION_COLOR = {

      <button v-for="t in tabs" :key="t.key"

        <span>{{ t.icon }}</span> {{ t.label }}
      </button>

    <div class="px-5 py-3 text-xs text-gray-500 border-t">
      <div>v1.0 · XGBoost-only at runtime</div>
      <div class="mt-1">No live LLM · &lt; 100 ms per query</div>
      <a href="https://github.com/xuyaooo/smadex-creative" target="_blank"

    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-60 p-8 max-w-7xl">
    <component :is="activeView" :overview="overview" :dimensions="dimensions"
               @select-creative="selectCreative" />
  </main>
</div>
  `,
  setup() {
    const tabs = [
      { key: 'home',     label: 'Home',           icon: '🏠' },
      { key: 'health',   label: 'Health Score',   icon: '🩺' },
      { key: 'explain',  label: 'Explain',        icon: '🔍' },
      { key: 'recommend',label: 'Recommend',      icon: '🎯' },
      { key: 'cluster',  label: 'Cluster Map',    icon: '🌐' },
      { key: 'explorer', label: 'Explorer',       icon: '📈' },
    ];
    const activeTab = ref('home');
    const overview = ref(null);
    const dimensions = ref(null);

    onMounted(async () => {
      overview.value = await fetch(API + '/api/overview').then(r => r.json());
      dimensions.value = await fetch(API + '/api/dimensions').then(r => r.json());
    });

    const activeView = computed(() => {
      return {
        home: HomeTab, health: HealthTab, explain: ExplainTab,
        recommend: RecommendTab, cluster: ClusterTab, explorer: ExplorerTab,
      }[activeTab.value];
    });

    function selectCreative(cid, target) {
      activeTab.value = target || 'health';
      // The selected tab will pick up the cid via a global event.
      window.dispatchEvent(new CustomEvent('cid-selected', { detail: cid }));
    }

    return { tabs, activeTab, activeView, overview, dimensions, selectCreative };
  },
};

// ---------------- HOME ----------------
const HomeTab = {
  props: ['overview'],
  template: `
<div>
  <!-- Hero -->
  <div class="rounded-2xl text-white p-10 mb-8" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);">
    <div class="text-xs uppercase tracking-[0.2em] opacity-80 font-semibold">Smadex Creative Intelligence Challenge</div>
    <h1 class="text-5xl font-extrabold mt-2 leading-tight">Creative Copilot</h1>
    <p class="text-lg opacity-95 mt-4 max-w-3xl">
      Bridge ad imagery and KPIs. One cached "Creative Genome" vector powers
      health scoring, fatigue detection, explainability, recommendation, and
      clustering — entirely without live LLM calls.
    </p>
    <div class="mt-6 flex flex-wrap gap-2">
      <span class="bg-white/20 px-4 py-1.5 rounded-full text-sm font-semibold">&lt; 100 ms / query</span>
      <span class="bg-white/20 px-4 py-1.5 rounded-full text-sm font-semibold">No live LLM</span>
      <span class="bg-white/20 px-4 py-1.5 rounded-full text-sm font-semibold">24 / 24 tests passing</span>

    </div>
  </div>

  <!-- Metric cards -->
  <div v-if="overview" class="grid grid-cols-4 gap-4 mb-8">
    <div v-for="(card, i) in metricCards" :key="i"

      <div class="text-xs uppercase tracking-wider text-gray-500 font-semibold">{{ card.label }}</div>
      <div class="text-3xl font-bold mt-1">{{ card.value }}</div>
    </div>
  </div>

  <!-- Sections -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <section class="bg-white rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold mb-3">Why this exists</h2>
      <p class="text-sm text-gray-700 leading-relaxed">

        Marketers know <i>what</i> failed (the metric drop) but not <i>why</i> (the visual reason).
        We built a single Genome representation that fuses image, metadata, and early behavioral
        signals — then serve five decision surfaces (score, explain, recommend, cluster, explore)
        from the same cached vector. Every prediction comes with a marketer-readable reason.
      </p>
    </section>

    <section class="bg-white rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold mb-3">Honest accuracy</h2>
      <table class="w-full text-sm">
        <tbody>
          <tr class="border-b"><td class="py-1.5 text-gray-600">OOF status accuracy</td><td class="py-1.5 text-right font-mono font-semibold">0.79</td></tr>
          <tr class="border-b"><td class="py-1.5 text-gray-600">OOF macro F1</td><td class="py-1.5 text-right font-mono font-semibold">0.69</td></tr>
          <tr class="border-b"><td class="py-1.5 text-gray-600">OOF Perf MAE</td><td class="py-1.5 text-right font-mono font-semibold">0.0256</td></tr>
          <tr class="border-b"><td class="py-1.5 text-gray-600">ECE post-temperature</td><td class="py-1.5 text-right font-mono font-semibold">0.041</td></tr>
          <tr class="border-b"><td class="py-1.5 text-gray-600">Cluster vertical purity</td><td class="py-1.5 text-right font-mono font-semibold">100 %</td></tr>

        </tbody>
      </table>
    </section>
  </div>

  <section class="bg-white rounded-xl p-6 shadow-sm mb-8">
    <h2 class="text-lg font-bold mb-3">Architecture at a glance</h2>
    <pre class="text-xs leading-relaxed font-mono bg-gray-50 p-4 rounded overflow-x-auto">
PNG creative                  Tabular metadata          Daily fact table             OpenRouter teacher
├─ SigLIP-2 ViT-B/16 (2025)   ├─ OneHot/Label/ratios    ├─ first-7-day aggregates    ├─ gemini-2.5-flash
└─ → 768-d → PCA(64)          └─ 77 dims                └─ 21 dims                   └─ 15-d rubric (0-10)
                                            │
                                            ▼
                            ┌──────────────────────────────┐
                            │  Creative Genome — 177 dims  │
                            └──────────────────────────────┘
                                            │
              ┌────────────┬────────────┬───┴──────────┬────────────────┐
              ▼            ▼            ▼              ▼                ▼
          XGBoost x5    LightGBM    KNN + MMR     UMAP + HDBSCAN    pandas slicer
          + temperature + BOCPD     (vertical-     (32 named         (192k row
          + class bias  on daily    scoped)         clusters,         fact table)
                        CTR                         100 % purity)
    </pre>
  </section>

  <section class="bg-white rounded-xl p-6 shadow-sm mb-8">
    <h2 class="text-lg font-bold mb-3">Tech stack & paper lineage</h2>
    <p class="text-xs text-gray-600 mb-4">Every method we use, with year + canonical citation. Click each for the paper.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm">
      <a v-for="t in techStack" :key="t.method" :href="t.url" target="_blank"
         class="block px-3 py-2 rounded-lg border border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 transition">
        <div class="flex items-baseline gap-2">
          <span class="font-mono text-xs text-gray-400 w-12 flex-shrink-0">{{ t.year }}</span>
          <span class="font-semibold">{{ t.method }}</span>
        </div>
        <div class="text-xs text-gray-600 ml-14 mt-0.5">{{ t.cite }}</div>
        <div class="text-xs text-indigo-600 ml-14 mt-0.5">→ {{ t.use }}</div>
      </a>
    </div>
  </section>

  <section class="bg-white rounded-xl p-6 shadow-sm mb-8">
    <h2 class="text-lg font-bold mb-3">Build timeline — how this came together</h2>
    <ol class="list-decimal ml-5 space-y-2 text-sm text-gray-700">
      <li><b>Audited the original "leaky" model.</b> Initial CV claimed Perf MAE 0.0062. We found the target <code>perf_score</code> was being computed <i>from</i> <code>overall_ctr</code>/<code>overall_ipm</code>/<code>overall_roas</code> — which were also features. Removed them. Honest MAE jumped to 0.0413.</li>
      <li><b>Fixed the merge bug.</b> <code>loader.load_master_table</code> was producing <code>vertical_x</code>/<code>vertical_y</code>; the OHE for <code>vertical</code> was silently dropping. After the fix, vertical became the #1 feature.</li>
      <li><b>Added real early-life features.</b> 21-d aggregates from the first 7 days of the daily fact table. Honest signal, no leakage. MAE 0.0413 → 0.0258.</li>
      <li><b>Class imbalance.</b> 5-seed bagged XGBoost + balanced sample weights + 1.7× boost on top_performer. Macro F1 0.49 → 0.73.</li>
      <li><b>Calibration.</b> Temperature scaling on OOF status probs. ECE 0.075 → 0.024.</li>
      <li><b>OpenRouter teacher (offline, one time).</b> 64-thread concurrent calls to gemini-2.5-flash, $1.50 total. Cached as a 15-d numeric rubric + a natural-language JSON analysis per creative.</li>
      <li><b>Offline artifacts.</b> UMAP → HDBSCAN clustering, vertical-scoped KNN indices, SHAP backgrounds, deterministic cluster names. All read at startup, served from RAM.</li>
      <li><b>SmolVLM LoRA.</b> 14-min training on a single RTX 4090. Distills the cached teacher annotations so the demo can produce fresh annotations for new creatives without calling OpenRouter.</li>
      <li><b>Visual encoder upgrade.</b> CLIP ViT-B/32 (2021, 512-d) → SigLIP-2 base (2025, 768-d).</li>
      <li><b>Domain-adaptive pretraining.</b> Contrastive fine-tune of SigLIP-2 on Smadex creative ↔ caption pairs (5 epochs / 20s on RTX 4090).</li>
      <li><b>Triple audit.</b> Statistical rigor + SOTA literature + production readiness. 24/24 pytest, latencies all &lt; 100 ms p95.</li>
      <li><b>FastAPI + Vue.js.</b> Replaced Gradio with a clean back-end / front-end split (this UI).</li>
    </ol>
  </section>

  <section class="bg-white rounded-xl p-6 shadow-sm mb-8">
    <h2 class="text-lg font-bold mb-3">Public datasets we evaluated for scaling</h2>
    <p class="text-sm text-gray-600 mb-3">No public dataset matches our exact niche (mobile display ads + per-creative daily lifecycle CTR/CVR + country/OS breakdowns) — industry holders keep this proprietary. Best 3 to combine via transfer learning:</p>
    <div class="space-y-3 text-sm">
      <div class="border-l-4 border-indigo-400 bg-indigo-50/50 p-3 rounded">
        <div class="font-semibold">1. Pittsburgh Image Ads <span class="font-normal text-gray-500">(Hussain et al., CVPR 2017)</span></div>
        <div class="text-gray-700">64,832 ad images + 38 topic classes + sentiment labels. Best for pre-training a visual encoder on real ad layouts.</div>
        <div class="text-xs text-gray-500 mt-1">Research-only license · <a href="https://people.cs.pitt.edu/~kovashka/ads/" target="_blank" class="text-indigo-600">people.cs.pitt.edu/~kovashka/ads/</a></div>
      </div>
      <div class="border-l-4 border-indigo-400 bg-indigo-50/50 p-3 rounded">
        <div class="font-semibold">2. RICO <span class="font-normal text-gray-500">(Deka et al., UIST 2017)</span></div>
        <div class="text-gray-700">72,219 Android UI screens from 9.7k apps. Self-supervised pre-training (MAE/DINO) for mobile-screen geometry priors.</div>
        <div class="text-xs text-gray-500 mt-1">CC-BY-4.0 · <a href="http://interactionmining.org/rico" target="_blank" class="text-indigo-600">interactionmining.org/rico</a></div>
      </div>
      <div class="border-l-4 border-indigo-400 bg-indigo-50/50 p-3 rounded">
        <div class="font-semibold">3. Criteo 1TB Click Logs + Avazu CTR <span class="font-normal text-gray-500">(2014)</span></div>
        <div class="text-gray-700">~4 B impressions with click labels. Pre-train the tabular CTR head on this scale, then fine-tune the early-life behavioral features on Smadex.</div>
        <div class="text-xs text-gray-500 mt-1">Free, research · <a href="https://ailab.criteo.com/download-criteo-1tb-click-logs-dataset/" target="_blank" class="text-indigo-600">ailab.criteo.com</a></div>
      </div>
    </div>
    <p class="text-xs text-gray-500 mt-3">Recipe: pre-train SigLIP-2 on Pittsburgh Ads (multi-task topic + sentiment), continue on RICO (self-supervised), pre-train the tabular branch on Criteo+Avazu, fine-tune on Smadex. Expected lift: 5–10 pp on the 4-class status head — IF the underlying data-side bottleneck (n=46 top performers) is also addressed.</p>
  </section>

  <section v-if="overview" class="bg-white rounded-xl p-6 shadow-sm">
    <h2 class="text-lg font-bold mb-3">Portfolio snapshot</h2>
    <div ref="statusChart" style="height:280px"></div>
  </section>
</div>
  `,
  setup(props) {
    const statusChart = ref(null);
    const metricCards = computed(() => {
      const t = props.overview?.totals;
      if (!t) return [];
      return [
        { label: 'Total creatives', value: t.creatives.toLocaleString(), color: '#3498db' },
        { label: 'Advertisers',     value: t.advertisers.toLocaleString(), color: '#9b59b6' },
        { label: 'Campaigns',       value: t.campaigns.toLocaleString(), color: '#1abc9c' },
        { label: 'Avg perf score',  value: t.avg_perf_score.toFixed(3), color: '#2ecc71' },
      ];
    });
    const techStack = [
      { year: 1901, method: 'PCA', cite: 'Pearson, Phil. Mag. 6:2',
        use: 'dim reduction on 768-d SigLIP-2 features', url: 'https://www.tandfonline.com/doi/abs/10.1080/14786440109462720' },
      { year: 1996, method: 'Bagging', cite: 'Breiman, Machine Learning',
        use: '5-seed XGBoost ensemble for status', url: 'https://link.springer.com/article/10.1007/BF00058655' },
      { year: 1998, method: 'MMR', cite: 'Carbonell & Goldstein, SIGIR',
        use: 'diversification in find_similar', url: 'https://dl.acm.org/doi/10.1145/290941.291025' },
      { year: 2007, method: 'BOCPD', cite: 'Adams & MacKay, arXiv:0710.3742',
        use: 'changepoint detection on daily CTR', url: 'https://arxiv.org/abs/0710.3742' },
      { year: 2016, method: 'XGBoost', cite: 'Chen & Guestrin, KDD',
        use: 'primary perf + status predictor', url: 'https://dl.acm.org/doi/10.1145/2939672.2939785' },
      { year: 2017, method: 'LightGBM', cite: 'Ke et al., NeurIPS',
        use: 'early-life fatigue classifier', url: 'https://proceedings.neurips.cc/paper/2017/hash/6449f44a102fde848669bdd9eb6b76fa-Abstract.html' },
      { year: 2017, method: 'Temperature scaling', cite: 'Guo et al., ICML',
        use: 'calibration of status probs', url: 'https://arxiv.org/abs/1706.04599' },
      { year: 2017, method: 'TreeSHAP', cite: 'Lundberg et al., NeurIPS',
        use: 'sub-ms feature attribution per query', url: 'https://arxiv.org/abs/1705.07874' },
      { year: 2017, method: 'HDBSCAN', cite: 'McInnes & Healy, JOSS',
        use: 'density-based clustering of the genome', url: 'https://joss.theoj.org/papers/10.21105/joss.00205' },
      { year: 2018, method: 'UMAP', cite: 'McInnes et al., arXiv:1802.03426',
        use: 'cluster map projection', url: 'https://arxiv.org/abs/1802.03426' },
      { year: 2020, method: 'DiCE counterfactuals', cite: 'Mothilal et al., FAT*',
        use: 'rubric-axis counterfactual suggestions', url: 'https://arxiv.org/abs/1905.07697' },
      { year: 2021, method: 'Vision Transformer', cite: 'Dosovitskiy et al., ICLR',
        use: 'base architecture under SigLIP-2', url: 'https://arxiv.org/abs/2010.11929' },
      { year: 2022, method: 'LoRA', cite: 'Hu et al., ICLR',
        use: 'parameter-efficient SmolVLM finetune', url: 'https://arxiv.org/abs/2106.09685' },
      { year: 2023, method: 'SigLIP loss', cite: 'Zhai et al., ICCV',
        use: 'parent of the visual encoder', url: 'https://arxiv.org/abs/2303.15343' },
      { year: 2024, method: 'TabM', cite: 'Gorishniy et al., 2024',
        use: 'alternative deep tabular ensemble (cached OOF)', url: 'https://arxiv.org/abs/2410.24210' },
      { year: 2025, method: 'SigLIP-2', cite: 'Tschannen et al., arXiv:2502.14786',
        use: 'current 768-d visual encoder', url: 'https://arxiv.org/abs/2502.14786' },
      { year: 2025, method: 'SmolVLM', cite: 'Marafioti et al., HuggingFace',
        use: 'optional local distilled VLM', url: 'https://arxiv.org/abs/2504.05299' },
      { year: 2025, method: 'gemini-2.5-flash', cite: 'Google DeepMind',
        use: 'offline teacher for rubric + annotations', url: 'https://deepmind.google/technologies/gemini/' },
    ];
    watch(() => props.overview, (ov) => {
      if (!ov) return;
      nextTick(() => {
        const sd = ov.status_distribution;
        const colors = { top_performer:'#16a34a', stable:'#2563eb', fatigued:'#ea580c', underperformer:'#dc2626' };
        Plotly.newPlot(statusChart.value, [{
          x: sd.map(s => s.count),
          y: sd.map(s => STATUS_LABEL[s.status]),
          orientation: 'h', type: 'bar', text: sd.map(s => s.count),
          textposition: 'outside',
          marker: { color: sd.map(s => colors[s.status]) },
        }], {
          margin: { l: 120, r: 30, t: 10, b: 40 },
          plot_bgcolor: 'white', paper_bgcolor: 'white',
          xaxis: { title: 'Count' },
        }, { responsive: true, displayModeBar: false });
      });
    }, { immediate: true });
    return { metricCards, techStack, statusChart };
  },
};

const HEALTH_TECH = `

  <div class="mt-2 text-xs text-gray-500"><b>Latency:</b> 40 ms p50, 53 ms p95 (one-call sample, warm cache).</div>
</div>`;

const ClusterTab = {
  template: `
<div>
  <h1 class="text-2xl font-bold mb-1">Cluster Map</h1>
  <p class="text-gray-600 mb-6">Visual + behavioral clustering of all 1,080 creatives, projected with UMAP.</p>
  <details class="mb-6 bg-white rounded-lg p-4 shadow-sm">
    <summary class="cursor-pointer font-semibold text-sm">📐 How it's computed (click to expand)</summary>
    <div class="mt-3" v-html="techHtml"></div>
  </details>
  <button @click="load" class="bg-indigo-600 text-white px-5 py-2 rounded font-semibold hover:bg-indigo-700 mb-4">
    {{ data ? 'Refresh' : 'Render cluster map' }}
  </button>
  <div v-if="loading" class="text-gray-500">Building 1080-point UMAP scatter...</div>
  <div v-if="data" class="bg-white rounded-xl p-5 shadow-sm">
    <div ref="chart" style="height:600px"></div>
  </div>
</div>
  `,
  setup() {
    const data = ref(null), loading = ref(false), chart = ref(null);
    async function load() {
      loading.value = true;
      data.value = await fetch(API + '/api/clusters/map').then(r => r.json());
      await nextTick();
      // Group by cluster_name for one trace per cluster
      const groups = {};
      for (const p of data.value.points) {
        if (p.cluster_id < 0) continue;
        const k = p.cluster_name;
        groups[k] = groups[k] || { x: [], y: [], cids: [], status: [] };
        groups[k].x.push(p.umap_x);
        groups[k].y.push(p.umap_y);
        groups[k].cids.push(p.creative_id);
        groups[k].status.push(p.creative_status);
      }
      const traces = Object.entries(groups).map(([name, g]) => ({
        x: g.x, y: g.y, type: 'scattergl', mode: 'markers',
        name, text: g.cids.map((c, i) => `cid ${c}<br>${g.status[i]}`),
        hoverinfo: 'text', marker: { size: 6, opacity: 0.7 },
      }));
      Plotly.newPlot(chart.value, traces, {
        margin: { l: 40, r: 200, t: 10, b: 40 }, plot_bgcolor: 'white',
        legend: { font: { size: 10 } },
      }, { responsive: true, displayModeBar: false });
      loading.value = false;
    }
    return { data, loading, chart, load, techHtml: CLUSTER_TECH };
  },
};
